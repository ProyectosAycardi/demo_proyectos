<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al proyecto</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login">

<header class="header">

  <!-- Títulos -->
  <div class="header-center">
    <h1 id="tituloProyecto"></h1>
  </div>

  <!-- Logo -->
  <div class="header-right">
    <img src="assets/img/LogoB.png" class="logo">
  </div>
<script>
(function() {

const tokenCorrecto = "cliente-aycardi";

// fecha de expiración (7 marzo 2026 a las 00:00)
const fechaExpiracion = new Date("2026-03-05T16:48:00");

// obtener parámetros del link
const params = new URLSearchParams(window.location.search);
const token = params.get("demo");

// si el token es incorrecto
if (token !== tokenCorrecto) {
    document.write(`
        <div style="font-family:Arial;text-align:center;margin-top:120px">
            <h1>Acceso restringido</h1>
            <p>Este enlace no es válido.</p>
        </div>
    `);
    throw new Error("Acceso bloqueado");
}

// si la demo expiró
if (new Date() > fechaExpiracion) {
    document.write(`
        <div style="font-family:Arial;text-align:center;margin-top:120px">
            <h1>Demo expirada</h1>
            <p>La demostración ya no está disponible.</p>
        </div>
    `);
    throw new Error("Demo expirada");
}

})();
</script>
</header>

<main class="login-container">

  <!-- IZQUIERDA: imagen -->
  <div class="login-image">
    <img src="assets/img/MODELO 3D.png" alt="Modelo 3D">
  </div>

  <!-- DERECHA: contenido -->
  <div class="login-content">

    <div class="login-card">
        <img src="assets/img/LogoCliente.png" class="logo-cliente">

      <h2>Inicio de sesión</h2>

      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="password" placeholder="Contraseña">

      <button onclick="login()">Ingresar</button>

      <p id="loginError" class="error"></p>
    </div>

  </div>

</main>


<script src="js/login.js"></script>

</body>
</html>
