<!DOCTYPE html>
<html lang="es">
<head>
  <script>
(function() {

const tokenCorrecto = "cliente-aycardi";
const fechaExpiracion = new Date("2026-03-07T00:00:00");

const params = new URLSearchParams(window.location.search);
const token = params.get("demo");

// Bloqueo por token
if (token !== tokenCorrecto) {
  document.write("<h2 style='font-family:Arial;text-align:center;margin-top:120px'>Acceso restringido</h2>");
  window.stop();
  throw new Error("Acceso bloqueado");
}

// Bloqueo por fecha
if (new Date() > fechaExpiracion) {
  document.write("<h2 style='font-family:Arial;text-align:center;margin-top:120px'>Demo expirada</h2>");
  window.stop();
  throw new Error("Demo expirada");
}

})();
</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso al proyecto</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login">

<header class="header">

  <!-- Títulos -->
  <div class="header-center">
    <h1 id="tituloProyecto"></h1>
  </div>

  <!-- Logo -->
  <div class="header-right">
    <img src="assets/img/LogoB.png" class="logo">
  </div>

</header>

<main class="login-container">

  <!-- IZQUIERDA: imagen -->
  <div class="login-image">
    <img src="assets/img/MODELO 3D.png" alt="Modelo 3D">
  </div>

  <!-- DERECHA: contenido -->
  <div class="login-content">

    <div class="login-card">
        <img src="assets/img/LogoCliente.png" class="logo-cliente">

      <h2>Inicio de sesión</h2>

      <input type="text" id="usuario" placeholder="Usuario">
      <input type="password" id="password" placeholder="Contraseña">

      <button onclick="login()">Ingresar</button>

      <p id="loginError" class="error"></p>
    </div>

  </div>

</main>


<script src="js/login.js"></script>

</body>
</html>
